<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Husky Adventures</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>

    <!-- Käyttöliittymä pelin päällä -->
    <div id="hud">
      <div class="hud-item">🏆 Taso <span id="level">1</span></div>
      <div class="hud-item">🐾 <span id="progress">0</span>/<span id="goal">8</span></div>
      <div class="hud-item">🦴 Lv <span id="huskyLevel">1</span></div>
      <div class="hud-item">💎 <span id="gems">0</span></div>
      <div class="hud-item">❤️ <span id="lives">3</span></div>
      <button id="mute-btn" class="hud-item" type="button" title="Äänet päälle/pois">🔊</button>
    </div>

    <!-- Huskyn kokemusmittari -->
    <div id="xpbar"><div id="xpfill"></div></div>

    <!-- Opitut taidot -->
    <div id="perks"></div>

    <!-- Tasonvaihtobanneri -->
    <div id="banner"></div>

    <!-- Kosketusohjaus (näkyy vain kosketuslaitteilla) -->
    <div id="touch-controls">
      <div id="joystick">
        <div id="joystick-knob"></div>
      </div>
      <div id="howl-btn">🐺</div>
      <div id="sprint-btn">⚡</div>
    </div>

    <!-- Taidonvalintanäyttö -->
    <div id="skill-overlay" class="hidden">
      <div id="skill-panel">
        <h2>🦴 Husky nousi tasolle <span id="huskyLevelUp">2</span>!</h2>
        <p>Valitse uusi taito:</p>
        <div id="skill-cards"></div>
      </div>
    </div>

    <!-- Aloitus-/lopetusnäyttö -->
    <div id="overlay">
      <div id="overlay-content">
        <h1>🐺 Husky Adventures</h1>
        <p id="overlay-text">Pyydystä pieniä eläimiä ja väistä isompia!</p>
        <p class="hint">Tietokone: WASD/nuolet &nbsp;•&nbsp; ⚡ Vaihto = kirmaus &nbsp;•&nbsp; Välilyönti = ulvonta</p>
        <div id="highscores"></div>
        <button id="start-btn">Aloita peli</button>
      </div>
    </div>
  </div>

  <script src="js/audio.js?v=10"></script>
  <script src="js/input.js?v=10"></script>
  <script src="js/sprites.js?v=10"></script>
  <script src="js/skills.js?v=10"></script>
  <script src="js/entities.js?v=10"></script>
  <script src="js/game.js?v=10"></script>
</body>
</html>
